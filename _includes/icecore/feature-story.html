
{% assign feature = site.posts | where: "featured", true | first %}

<div class="section-heading">
    <h3>Feature Story</h3>
</div>

{% if feature %}
<a class="feature-card" href="{{ feature.url | relative_url }}">

    <div class="feature-image">
        <img src="{{ feature.image | relative_url }}" alt="{{ feature.title }}">
    </div>

    <div class="feature-overlay">

        <div class="feature-date">
            {{ feature.date | date: "%b %d" | upcase }}
        </div>

        <h2>{{ feature.title }}</h2>

        <p>{{ feature.excerpt }}</p>

    </div>

</a>
{% endif %}
