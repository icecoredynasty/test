<div class="team-grid">

{% assign teams = site.teams | sort: "title" %}

{% for team in teams %}

<a href="{{ team.url | relative_url }}" class="team-card">

<div class="team-card-logo">

<img src="{{ team.logo | relative_url }}" alt="{{ team.title }}">

</div>

<div class="team-card-body">

<h3>{{ team.title }}</h3>

<p class="team-motto">
{{ team.motto }}
</p>

</div>

</a>

{% endfor %}

</div>
